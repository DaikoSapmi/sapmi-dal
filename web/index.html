<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sápmi dál</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="breaking" class="breaking hidden"></div>

  <header>
    <div id="topline" class="topline">Kárášjohka · Sápmi · Sotnabeaivi</div>
    <div class="brand">SÁPMI DÁL</div>
    <div class="updated-row">
      <div id="updated">Viežžamin…</div>
      <button id="settingsBtn" class="settings-btn" title="Heivet">⚙️</button>
    </div>
  </header>

  <aside id="settingsPanel" class="settings-panel hidden">
    <div class="settings-head">
      <strong>Heivehusat</strong>
      <button id="settingsClose" class="settings-close">✕</button>
    </div>
    <p class="settings-help">Guđe gáldut galget čájehuvvot, ja man ollu ášši juohke gáldus (guorus = buot).</p>
    <div id="settingsSources"></div>
    <div class="settings-actions">
      <button id="settingsReset">Máhcat</button>
      <button id="settingsSave">Vurke</button>
    </div>
  </aside>

  <main>
    <section class="lead-wrap">
      <article id="hero" class="hero"></article>
      <aside id="quick" class="quick"></aside>
    </section>

    <section>
      <h2 class="section-title">Norga</h2>
      <div id="norga" class="grid"></div>
    </section>

    <section>
      <h2 class="section-title">Ruoŧŧa</h2>
      <div id="ruotta" class="grid"></div>
    </section>

    <section>
      <h2 class="section-title">Suopma</h2>
      <div id="suopma" class="grid"></div>
    </section>

    <section>
      <h2 class="section-title">Ruošša</h2>
      <div id="ruossa" class="grid"></div>
    </section>
  </main>

  <footer>
    Gáldut: NRK Sápmi · Yle Sápmi · SVT Norrbotten · Ávvir · Ságat
  </footer>

  <script src="app.js?v=20260308b"></script>
</body>
</html>
